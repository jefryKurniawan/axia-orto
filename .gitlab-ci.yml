# Tentukan image Docker (PHP 8.2 FPM untuk Laravel 10)
image: php:8.2-fpm

# Definisikan service database
services:
  - mariadb:latest

# Definisikan environment variables
variables:
  MYSQL_DATABASE: laravel_test
  MYSQL_ROOT_PASSWORD: root
  # Lokasi cache Composer
  COMPOSER_CACHE_DIR: '$CI_PROJECT_DIR/vendor'

# Definisikan stages untuk pipeline
stages:
  - build
  - test
  - deploy

# Atur caching untuk mempercepat instalasi dependencies
cache:
  paths:
    - vendor/
    - node_modules/

# ===============================================
# JOB 1: BUILD (Install Dependencies)
# ===============================================
composer_install:
  stage: build
  script:
    - echo "--- Menginstal dependencies sistem ---"
    - apt-get update -yqq
    # Instal tools yang dibutuhkan (git, zip, ekstensi database dan image)
    - apt-get install -y git zip unzip libpq-dev libpng-dev libzip-dev
    - docker-php-ext-install pdo_mysql # Instal ekstensi MySQL/MariaDB
    
    - echo "--- Menginstal Composer Dependencies ---"
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --prefer-dist --no-ansi --no-interaction --no-progress
    
  artifacts:
    expire_in: 1 hour
    paths:
      # Job berikutnya akan menggunakan folder vendor ini
      - vendor/

# ===============================================
# JOB 2: TESTING (Jalankan PHPUnit Tests)
# ===============================================
unit_tests:
  stage: test
  # Harus menunggu job 'composer_install' selesai
  dependencies:
    - composer_install
  script:
    - echo "--- Menjalankan Unit Tests ---"
    # Buat file .env untuk testing (hanya jika belum ada)
    - cp .env.example .env 
    - php artisan key:generate
    # Jalankan migration database (fresh)
    - php artisan migrate:fresh --env=testing --force
    # Jalankan tests
    - vendor/bin/phpunit 
    
